id: markets
display_name: Markets
version: 1.0.0
description: Watchlist deltas, macro signal, new filings.
model:
  primary: anthropic:claude-sonnet-4-6
  fallback: anthropic:claude-haiku-4-5
  temperature: 0.2
prompt: prompts/markets.md
input_schema: MarketsInput
output_schema: MarketDigest
tools:
  mcp: [polygon, sec_edgar]
limits:
  max_turns: 6
  wallclock_seconds: 60
policies: [cite_every_claim]
evals:
  set: evals/cases/markets/*.yaml
  gate_score: 0.85
