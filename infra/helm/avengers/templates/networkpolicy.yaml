{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "avengers.fullname" . }}-default-deny
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "avengers.name" . }}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              ingress: avengers
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
        - port: 443
        - port: 5432  # Aurora
        - port: 7233  # Temporal gRPC
{{- end }}
