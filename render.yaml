# Render.com "infrastructure as code" config.
#
# Deploy in 60 seconds:
#   1. Open https://render.com → Sign up / Sign in with GitHub
#   2. New + → Blueprint → connect Bksingh9/avengers-jarvis
#   3. Render auto-detects this file; click "Apply"
#   4. Wait ~5 min for the first build; note the assigned hostname
#      (e.g. https://avengers-api.onrender.com)
#   5. Paste that hostname into Vercel's AVENGERS_API_INTERNAL env var
#
# Free tier: 512 MB / shared CPU. Render spins it down after 15 minutes of
# inactivity (~10 s cold-start). Upgrade to "Starter" ($7/mo) to keep warm.

services:
  - type: web
    name: avengers-api
    runtime: docker
    region: singapore                # closest free-tier region to Mumbai
    plan: free
    dockerfilePath: infra/docker/Dockerfile.api
    dockerContext: .
    healthCheckPath: /healthz
    autoDeploy: true                  # redeploy on every push to main
    envVars:
      - key: AVENGERS_ENVIRONMENT
        value: production
      - key: AVENGERS_LOG_LEVEL
        value: INFO
      - key: AVENGERS_REGION
        value: ap-south-1
      # Wildcards for Vercel previews + Vercel production + localhost dev +
      # the desktop wake-word helper (Origin: null when posted from a Python script).
      - key: AVENGERS_CORS_ORIGINS
        value: "https://*.vercel.app,http://localhost:3000,null"
      - key: COMMERCE_BACKEND
        value: both                   # registers both fynd_oms and jiocommerce
      - key: CRON_SECRET
        generateValue: true           # Render generates + injects a strong secret
      # NOTE: PORT is intentionally NOT set here. Render auto-assigns one
      # (usually 10000) and injects it as $PORT — the Dockerfile reads
      # `${PORT:-8080}` so it binds to whatever Render picks. Hardcoding
      # PORT here would break Render's traffic routing.
